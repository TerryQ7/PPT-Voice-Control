name: Release (Windows bilingual build)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: zh
            entry: main.py
            app_name: PPT语音控制助手
            asset_base: PPT-Voice-Control-zh-CN-Windows
          - lang: en
            entry: main_en.py
            app_name: PPT-Voice-Control
            asset_base: PPT-Voice-Control-en-US-Windows
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sounddevice numpy pynput pyinstaller
          pip install funasr torch torchaudio modelscope

      - name: Download FunASR model
        run: |
          python -c "
          from modelscope.hub.snapshot_download import snapshot_download
          import shutil, os
          model_dir = snapshot_download('iic/speech_paraformer-large_asr_nat-zh-cn-16k-common-vocab8404-pytorch')
          dest = 'funasr_model'
          if os.path.exists(dest):
              shutil.rmtree(dest)
          shutil.copytree(model_dir, dest)
          print(os.listdir(dest))
          "

      - name: Build with PyInstaller (bundled model)
        run: |
          pyinstaller `
            --name "${{ matrix.app_name }}" `
            --windowed `
            --onedir `
            --noconfirm `
            --clean `
            --add-data "funasr_model;funasr_model" `
            --hidden-import sounddevice `
            --hidden-import numpy `
            --hidden-import funasr `
            --hidden-import torch `
            --hidden-import torchaudio `
            --hidden-import modelscope `
            --hidden-import pynput `
            --hidden-import pynput.keyboard `
            --hidden-import pynput.keyboard._win32 `
            --collect-all sounddevice `
            --collect-all funasr `
            ${{ matrix.entry }}

      - name: Package zip
        shell: pwsh
        run: |
          $src = "dist/${{ matrix.app_name }}"
          $zip = "release/${{ matrix.asset_base }}.zip"
          New-Item -ItemType Directory -Force -Path "release" | Out-Null
          if (Test-Path $zip) { Remove-Item $zip }
          Compress-Archive -Path "$src/*" -DestinationPath $zip -CompressionLevel Optimal
          Get-Item $zip | Format-List

      - name: Upload release zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_base }}
          path: release/${{ matrix.asset_base }}.zip
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/${{ matrix.asset_base }}.zip
          generate_release_notes: true
