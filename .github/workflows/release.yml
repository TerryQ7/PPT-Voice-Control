name: Release (Windows installers)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label embedded in the installer (e.g. 1.0.0)"
        required: false
        default: "0.0.0-dev"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: zh
            entry: main.py
            app_name: PPT语音控制助手
            artifact: PPT语音控制助手-Installer
          - lang: en
            entry: main_en.py
            app_name: PPT-Voice-Control
            artifact: PPT-Voice-Control-Installer
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $ref = '${{ github.ref_name }}'
          if ($ref -match '^v') {
            $version = $ref -replace '^v',''
          } else {
            $version = '${{ github.event.inputs.version }}'
            if (-not $version) { $version = '0.0.0-dev' }
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Resolved version: $version"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sounddevice numpy pynput pyinstaller
          pip install funasr torch torchaudio modelscope

      - name: Download FunASR model
        run: |
          python -c "
          from modelscope.hub.snapshot_download import snapshot_download
          import shutil, os
          model_dir = snapshot_download('iic/speech_paraformer-large_asr_nat-zh-cn-16k-common-vocab8404-pytorch')
          dest = 'funasr_model'
          if os.path.exists(dest):
              shutil.rmtree(dest)
          shutil.copytree(model_dir, dest)
          print(os.listdir(dest))
          "

      - name: Build with PyInstaller (bundled model)
        run: |
          pyinstaller `
            --name "${{ matrix.app_name }}" `
            --windowed `
            --onedir `
            --noconfirm `
            --clean `
            --add-data "funasr_model;funasr_model" `
            --hidden-import sounddevice `
            --hidden-import numpy `
            --hidden-import funasr `
            --hidden-import torch `
            --hidden-import torchaudio `
            --hidden-import modelscope `
            --hidden-import pynput `
            --hidden-import pynput.keyboard `
            --hidden-import pynput.keyboard._win32 `
            --collect-all sounddevice `
            --collect-all funasr `
            ${{ matrix.entry }}

      - name: Stage installer files
        shell: pwsh
        run: |
          if (Test-Path installer_staging) { Remove-Item installer_staging -Recurse -Force }
          New-Item -ItemType Directory -Force -Path installer_staging | Out-Null
          Copy-Item -Path "dist/${{ matrix.app_name }}/*" -Destination installer_staging -Recurse
          Get-ChildItem installer_staging | Select-Object -First 10 | Format-Table

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          # ChineseSimplified.isl is not bundled with the default Inno Setup
          # install (it lives under "Unofficial Translations"), so fetch it
          # directly from the official issrc source tree.
          $langDir = "C:\Program Files (x86)\Inno Setup 6\Languages"
          $target  = Join-Path $langDir "ChineseSimplified.isl"
          if (-not (Test-Path $target)) {
            Invoke-WebRequest `
              -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl" `
              -OutFile $target
          }
          Get-Item $target | Format-List Name, Length

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found at $iscc"
          }
          & $iscc `
            "/DAppLang=${{ matrix.lang }}" `
            "/DMyAppVersion=${{ steps.ver.outputs.version }}" `
            installer.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }
          Get-ChildItem release\*.exe | Format-List Name, Length

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*.exe
          retention-days: 30

      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          generate_release_notes: true
