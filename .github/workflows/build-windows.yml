name: Build Windows Executable

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sounddevice numpy pynput pyinstaller
          pip install funasr torch torchaudio modelscope

      - name: Download FunASR model
        run: |
          python -c "
          from modelscope.hub.snapshot_download import snapshot_download
          import shutil, os
          print('Downloading Paraformer model...')
          model_dir = snapshot_download('iic/speech_seaco_paraformer_large_asr_nat-zh-cn-16k-common-vocab8404-pytorch')
          print(f'Model downloaded to: {model_dir}')
          dest = 'funasr_model'
          if os.path.exists(dest):
              shutil.rmtree(dest)
          shutil.copytree(model_dir, dest)
          print(f'Model copied to: {dest}')
          print(f'Contents: {os.listdir(dest)}')
          "

      - name: Build with PyInstaller
        run: |
          pyinstaller `
            --name "PPT语音控制助手" `
            --windowed `
            --onedir `
            --noconfirm `
            --clean `
            --add-data "funasr_model;funasr_model" `
            --hidden-import sounddevice `
            --hidden-import numpy `
            --hidden-import funasr `
            --hidden-import torch `
            --hidden-import torchaudio `
            --hidden-import modelscope `
            --hidden-import pynput `
            --hidden-import pynput.keyboard `
            --hidden-import pynput.keyboard._win32 `
            --collect-all sounddevice `
            --collect-all funasr `
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PPT语音控制助手-Windows
          path: dist/PPT语音控制助手/
          retention-days: 30
